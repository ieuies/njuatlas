services:
  - type: web
    name: njuatlas-frontend
    runtime: static
    buildCommand: echo "No build step for static frontend"
    staticPublishPath: .
    routes:
      # 同域反代（须在 Render Dashboard → Redirects/Rewrites 中确认已生效后再改 config 用 /api）
      - type: rewrite
        source: /api/*
        destination: https://api.njuatlas.cn/api/*
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: njuatlas-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    healthCheckPath: /api/health
    startCommand: flask db upgrade && gunicorn -c gunicorn.conf.py "app:create_app()"
    # 头像/封面写入此目录；无持久盘时每次部署会清空，导致 DB 里 URL 404
    disk:
      name: njuatlas-uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: UPLOAD_ROOT
        value: /opt/render/project/src/uploads
      - key: FLASK_APP
        value: app:create_app
      - key: SECRET_KEY
        sync: false
      - key: GAODE_API_KEY
        sync: false
      - key: ZHIPU_API_KEY
        sync: false
      - key: BAILIAN_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: "deepseek-chat"
      - key: DATABASE_URL
        sync: false
      - key: JWT_EXPIRATION_SECONDS
        value: "604800"
      - key: AMAP_CACHE_TTL_SECONDS
        value: "900"
      - key: AMAP_CACHE_MAX_ITEMS
        value: "256"
      - key: AMAP_REQUEST_TIMEOUT_SECONDS
        value: "8"
      - key: LOG_LEVEL
        value: "INFO"
      - key: CONVERSATION_HISTORY_LIMIT
        value: "20"
      - key: RATELIMIT_DEFAULT
        value: "200 per hour"
      - key: RATELIMIT_STORAGE_URI
        fromService:
          type: keyvalue
          name: njuatlas-redis
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: njuatlas-redis
          property: connectionString
      - key: FRONTEND_URL
        value: "https://njuatlas.cn"
      - key: EMAIL_VERIFICATION_TOKEN_SECONDS
        value: "86400"
      - key: PASSWORD_RESET_TOKEN_SECONDS
        value: "1800"
      - key: EMAIL_CODE_EXPIRATION_SECONDS
        value: "600"
      - key: EMAIL_CODE_RESEND_SECONDS
        value: "60"
      - key: EMAIL_CODE_MAX_ATTEMPTS
        value: "5"
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      # 注意：Blueprint 部署会以本文件为准覆盖 Dashboard 同名变量
      - key: REGISTER_EMAIL_RESTRICTION_ENABLED
        value: "false"
      - key: REGISTER_EMAIL_SUFFIX
        value: "@smail.nju.edu.cn,@nju.edu.cn,@163.com"

  - type: keyvalue
    name: njuatlas-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
