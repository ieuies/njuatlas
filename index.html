<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>左侧侧边栏 · 可折叠</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.2s ease;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
        }

        body.dark {
            background: linear-gradient(135deg, #1a1e2a 0%, #131724 100%);
        }

        /* 整体布局：侧边栏固定，右侧内容滚动 */
        .app {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* ========= 左侧侧边栏（可折叠） ========= */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            transition: width 0.25s ease, padding 0.2s ease;
            flex-shrink: 0;
            z-index: 10;
        }

        /* 折叠状态：宽度为0，隐藏内容 */
        .sidebar.collapsed {
            width: 0;
            padding: 1.5rem 0;
            overflow: hidden;
            border-right: none;
        }

        body.dark .sidebar {
            background: rgba(30, 34, 48, 0.85);
            border-right-color: rgba(255, 255, 255, 0.05);
        }

        /* 折叠/展开按钮（位于侧边栏右边缘） */
        .toggle-sidebar-btn {
            position: fixed;
            left: 260px;  /* 默认侧边栏宽度 */
            top: 50%;
            transform: translateY(-50%);
            background: #3b82f6;
            color: white;
            border: none;
            width: 28px;
            height: 48px;
            border-radius: 0 20px 20px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            z-index: 20;
            transition: left 0.25s ease, background 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .toggle-sidebar-btn:hover {
            background: #2563eb;
        }
        /* 侧边栏折叠时，按钮紧贴左边 */
        .sidebar.collapsed ~ .toggle-sidebar-btn {
            left: 0;
        }
        /* 深色模式下的按钮 */
        body.dark .toggle-sidebar-btn {
            background: #4f46e5;
        }

        /* Logo / 标题 */
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(120deg, #3b82f6, #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1.8rem;
            text-align: center;
            letter-spacing: -0.3px;
            white-space: nowrap;
        }

        /* 时间卡片（侧边栏内） */
        .time-card {
            background: rgba(59, 130, 246, 0.12);
            border-radius: 1.2rem;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .time-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #3b82f6;
            font-weight: 600;
        }
        .live-clock {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 0.5rem;
            color: #1e293b;
        }
        body.dark .live-clock {
            color: #e2e8f0;
        }
        .date-text {
            font-size: 0.75rem;
            color: #4b5563;
            margin-top: 0.25rem;
        }
        body.dark .date-text {
            color: #9ca3af;
        }

        /* 导航菜单 */
        .nav {
            flex: 1;
            margin-top: 0.5rem;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 1rem;
            border-radius: 0.8rem;
            color: #334155;
            text-decoration: none;
            margin-bottom: 0.25rem;
            transition: background 0.2s;
            white-space: nowrap;
        }
        body.dark .nav-item {
            color: #cbd5e1;
        }
        .nav-item:hover {
            background: rgba(59, 130, 246, 0.2);
        }
        .nav-item.active {
            background: #3b82f6;
            color: white;
        }
        .nav-icon {
            font-size: 1.2rem;
        }

        /* 深色模式按钮放在侧边栏底部 */
        .theme-btn {
            background: rgba(0, 0, 0, 0.05);
            border: none;
            width: 100%;
            padding: 0.6rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        body.dark .theme-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
        }

        /* ========= 右侧主内容区 ========= */
        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            transition: margin-left 0.25s ease;
        }

        /* 内容卡片样式 */
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255,255,255,0.3);
            max-width: 1000px;
            margin: 0 auto;
        }
        body.dark .card {
            background: rgba(30, 34, 48, 0.7);
            border-color: rgba(255,255,255,0.05);
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(120deg, #3b82f6, #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .greeting {
            font-size: 1.2rem;
            font-weight: 500;
            margin: 1.5rem 0 0.75rem;
            color: #334155;
        }
        body.dark .greeting {
            color: #cbd5e1;
        }
        .image-placeholder {
            background: #eef2ff;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            margin: 1.5rem 0;
        }
        body.dark .image-placeholder {
            background: #1e293b;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #6c757d;
            text-align: center;
        }

        /* 响应式：窄屏时侧边栏变为底部栏（手机）并且折叠按钮不可见或调整 */
        @media (max-width: 700px) {
            .toggle-sidebar-btn {
                display: none;  /* 手机端不显示折叠按钮，避免布局混乱 */
            }
            .sidebar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                top: auto;
                width: 100%;
                height: auto;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 0.5rem;
                border-right: none;
                border-top: 1px solid rgba(0,0,0,0.08);
                z-index: 10;
                backdrop-filter: blur(20px);
            }
            .sidebar.collapsed {
                width: 100%;
                padding: 0.5rem;
            }
            .logo, .time-card, .theme-btn {
                margin: 0 0.5rem;
            }
            .nav {
                display: flex;
                flex-wrap: wrap;
                gap: 0.25rem;
            }
            .main-content {
                padding: 1rem;
                margin-bottom: 80px;
            }
            .sidebar .time-card {
                display: none;
            }
            .nav-item span:last-child {
                display: none;
            }
            .nav-item {
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 左侧侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">🌐 NJU Atlas</div>

        <div class="time-card">
            <div class="time-label">⏰ 实时时钟</div>
            <div class="live-clock" id="liveClock">--:--</div>
            <div class="date-text" id="liveDate">----/--/--</div>
        </div>

        <nav class="nav">
            <a href="#" class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span>首页</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">📁</span>
                <span>项目</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">👥</span>
                <span>团队</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span>设置</span>
            </a>
        </nav>

        <button id="themeToggle" class="theme-btn">🌙 深色模式</button>
    </aside>

    <!-- 折叠/展开按钮 -->
    <button id="toggleSidebar" class="toggle-sidebar-btn" aria-label="折叠侧边栏">◀</button>

    <!-- 右侧主内容区 -->
    <main class="main-content">
        <div class="card">
            <h1>✨ 欢迎来到团队空间 ✨</h1>
            <p style="color: #4b5563; margin-bottom: 1rem;">点击左侧边缘的小箭头，可以隐藏/显示侧边栏。深色模式、折叠状态都会自动保存。</p>

            <div class="greeting">📌 右侧内容区</div>
            <p>你可以在这里放置团队介绍、文档、图片等。布局类似 DeepSeek 的侧边栏风格，并且增加了折叠功能。</p>

            <div class="greeting">🖼️ 图片插入示例</div>
            <div class="image-placeholder">
                🏞️ 在这里放入你的图片<br>
                <code style="background:#00000010; padding:0.2rem 0.4rem; border-radius:6px;">&lt;img src="images/你的图片.jpg" style="max-width:100%;"&gt;</code>
            </div>

            <footer>
                🧪 左侧侧边栏 | 可折叠 | 实时时钟 | 暗色模式
            </footer>
        </div>
    </main>
</div>

<script>
    // 实时更新时间（显示在侧边栏）
    function updateDateTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const timeStr = `${hours}:${minutes}:${seconds}`;
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const dateStr = `${year}/${month}/${day}`;
        
        const clockElem = document.getElementById('liveClock');
        const dateElem = document.getElementById('liveDate');
        if (clockElem) clockElem.innerText = timeStr;
        if (dateElem) dateElem.innerText = dateStr;
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);

    // 深色模式切换 + 按钮文字
    const toggleBtn = document.getElementById('themeToggle');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const storedTheme = localStorage.getItem('theme');

    function updateButtonText() {
        const isDark = document.body.classList.contains('dark');
        toggleBtn.innerHTML = isDark ? '☀️ 浅色模式' : '🌙 深色模式';
    }

    if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
        document.body.classList.add('dark');
    }
    updateButtonText();

    toggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        updateButtonText();
    });

    // 侧边栏折叠/展开逻辑
    const sidebar = document.getElementById('sidebar');
    const toggleSidebarBtn = document.getElementById('toggleSidebar');
    
    // 从 localStorage 读取侧边栏状态
    const isSidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
    if (isSidebarCollapsed) {
        sidebar.classList.add('collapsed');
        toggleSidebarBtn.innerHTML = '▶';  // 箭头方向改变
    } else {
        toggleSidebarBtn.innerHTML = '◀';
    }
    
    toggleSidebarBtn.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        const collapsed = sidebar.classList.contains('collapsed');
        localStorage.setItem('sidebarCollapsed', collapsed);
        // 改变箭头方向
        toggleSidebarBtn.innerHTML = collapsed ? '▶' : '◀';
    });
</script>
</body>
</html>
