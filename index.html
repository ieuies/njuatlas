<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>随便写的一个示例页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.2s ease;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            padding: 1rem;
        }

        /* 深色模式变量 */
        body.dark {
            background: linear-gradient(135deg, #1a1e2a 0%, #131724 100%);
        }

        .card {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(0, 0, 0, 0.02);
            padding: 2rem 2rem 2.5rem;
            text-align: center;
            transition: all 0.3s;
        }

        body.dark .card {
            background: rgba(30, 34, 48, 0.85);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 600;
            background: linear-gradient(120deg, #3b82f6, #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .sub {
            font-size: 1rem;
            color: #4b5563;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #e2e8f0;
            display: inline-block;
            padding-bottom: 0.3rem;
        }

        body.dark .sub {
            color: #a0aec0;
            border-bottom-color: #2d3748;
        }

        .time-box {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 1.5rem;
            margin: 1.5rem 0;
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: 2px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #0f172a;
        }

        body.dark .time-box {
            background: #1e293b;
            color: #e2e8f0;
        }

        .greeting {
            font-size: 1.2rem;
            font-weight: 500;
            margin: 1rem 0 0.5rem;
            color: #334155;
        }

        body.dark .greeting {
            color: #cbd5e1;
        }

        button {
            margin-top: 1.8rem;
            padding: 0.6rem 1.5rem;
            font-size: 0.95rem;
            border: none;
            border-radius: 3rem;
            background: #3b82f6;
            color: white;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.1s, background 0.2s;
        }

        button:hover {
            background: #2563eb;
            transform: scale(0.97);
        }

        button:active {
            transform: scale(0.95);
        }

        footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #6c757d;
        }

        body.dark footer {
            color: #7e8c9e;
        }

        a {
            color: #3b82f6;
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .card { padding: 1.5rem; }
            h1 { font-size: 1.8rem; }
            .time-box { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ 随便写的一个页面 ✨</h1>
        <div class="sub">index.html · 默认入口文件</div>

        <div class="greeting">📅 当前时间</div>
        <div class="time-box" id="liveClock">--:--:--</div>

        <div class="greeting">🌱 小提示</div>
        <p style="margin: 0.5rem 0 0; font-size: 0.9rem; line-height: 1.5;">
            当你访问一个目录（例如 <code style="background:#00000010; padding:0.2rem 0.4rem; border-radius:6px;">/</code> 或 <code style="background:#00000010; padding:0.2rem 0.4rem; border-radius:6px;">/folder/</code>），<br>
            Web 服务器会自动寻找该目录下的 <strong>index.html</strong> 并展示。
        </p>

        <button id="themeToggle">🌓 切换深色模式</button>
        <footer>
            🧪 示例页面 | 自动刷新时间 | 随意修改
        </footer>
    </div>

    <script>
        // 实时更新时间
        function updateClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const dateStr = `${year}-${month}-${day}`;
            const timeStr = `${hours}:${minutes}:${seconds}`;
            document.getElementById('liveClock').innerHTML = `${dateStr}<br style="display: none;" class="mobile-break"> <span style="font-size:0.9em;">${timeStr}</span>`;
            // 让日期和时间在手机上也好看
            if (window.innerWidth <= 480) {
                document.getElementById('liveClock').innerHTML = `${dateStr}<br>${timeStr}`;
            } else {
                document.getElementById('liveClock').innerHTML = `${dateStr} &nbsp;&nbsp; ${timeStr}`;
            }
        }
        updateClock();
        setInterval(updateClock, 1000);

        // 深色模式切换 (偏好本地存储)
        const toggleBtn = document.getElementById('themeToggle');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const storedTheme = localStorage.getItem('theme');
        if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
            document.body.classList.add('dark');
        }
        toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>
</body>
</html>
